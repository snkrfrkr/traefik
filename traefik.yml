api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /data/acme.json
      tlsChallenge: {}

providers:
  docker:
    exposedByDefault: false
    network: traefik

log:
  level: INFO
